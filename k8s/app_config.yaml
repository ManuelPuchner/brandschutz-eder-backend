apiVersion: v1
kind: ConfigMap
metadata:
  name: brandschutz-eder-config
  namespace: brandschutz-eder
  labels:
    app.kubernetes.io/name: brandschutz-eder
    app.kubernetes.io/component: config
data:
  # Spring
  SPRING_PROFILES_ACTIVE: prod

  # Server
  PORT: 8080

  # Database
  DB_HOST: postgres.postgres.svc.cluster.local
  DB_PORT: 5432
  DB_NAME: brandschutz-eder

  # JPA
  JPA_DDL_AUTO: update
  JPA_SHOW_SQL: false
